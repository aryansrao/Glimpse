name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: generate app icons
        working-directory: desktop
        run: npx tauri icon src-tauri/icons/icon.png

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Glimpse Desktop __VERSION__'
          releaseBody: |
            Download the installer for your platform:
            - **macOS**: Right-click the .dmg, select Open (unsigned build)
            - **Windows**: SmartScreen may block; click "Run anyway" (unsigned build)
            - **Linux**: Choose .AppImage or .deb depending on your distro
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
